include: package:very_good_analysis/analysis_options.yaml

analyzer:
  exclude:
    # Generated by json_serializable / drift_dev / riverpod_generator — not
    # human-maintained. Freezed already emits its own // ignore_for_file header,
    # but .g.dart files don't, so we exclude them project-wide to avoid
    # cosmetic lints (e.g. unnecessary_null_checks on enum maps).
    - '**/*.g.dart'
    # Regenerated by `patrol test` on every run.
    - 'integration_test/test_bundle.dart'
    - 'integration_test/patrol_test_bundle.dart'

linter:
  rules:
    document_ignores: false
    lines_longer_than_80_chars: false
    public_member_api_docs: false
    # Fire-and-forget is the deliberate pattern for UI event handlers,
    # stream listeners, and bootstrap — chasing this with `unawaited()`
    # at ~60 sites is noise for no behavior change.
    discarded_futures: false
    # The codebase consistently uses `for (final x in xs)` loops, which
    # Dart effective-style also prefers over `.forEach` for side effects.
    prefer_foreach: false
