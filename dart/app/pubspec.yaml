name: omnilect
description: "MITxxx — Unofficial MITx offline course app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  advertising_id: ^2.7.1
  audio_service: ^0.18.15
  audio_session: ^0.1.21
  background_downloader: ^8.0.0
  chewie: ^1.8.5
  connectivity_plus: ^6.1.3
  crypto: ^3.0.6
  dio: ^5.8.0
  drift: ^2.23.1
  firebase_analytics: ^11.3.6
  firebase_core: ^3.8.0
  firebase_crashlytics: ^4.2.0
  flutter:
    sdk: flutter
  flutter_chrome_cast: ^1.4.5
  flutter_inappwebview: ^6.1.5
  flutter_riverpod: ^3.0.0
  flutter_secure_storage: ^9.2.2
  flutter_to_airplay: ^2.1.0
  freezed_annotation: ^3.1.0
  go_router: ^14.6.1
  html: ^0.15.0
  html_unescape: ^2.0.0
  image: ^4.3.0
  json_annotation: ^4.9.0
  logging: ^1.3.0
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.3.0
  sqlite3_flutter_libs: ^0.5.25
  url_launcher: ^6.3.2
  video_player: ^2.9.2

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.4
  patrol: ^4.5.0
  patrol_cli: ^4.3.1
  riverpod_generator: ^4.0.0
  rps: ^0.7.0
  very_good_analysis: ^8.0.0

scripts:
  codegen: fvm dart run build_runner build --delete-conflicting-outputs
  codegen:watch: fvm dart run build_runner watch --delete-conflicting-outputs
  icons:dev: fvm dart run flutter_launcher_icons -f flutter_launcher_icons-dev.yaml
  icons:prod: fvm dart run flutter_launcher_icons -f flutter_launcher_icons-prod.yaml
  splash: fvm dart run flutter_native_splash:create


flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app_icon.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/icons/app_icon_splash_android12.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/js/

patrol:
  # Spec keeps the tests under integration_test/ (next to support/ helpers).
  # Override patrol's default `patrol_test/` so the bundler finds them.
  test_directory: integration_test
