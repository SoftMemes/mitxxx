name: emajtee
description: "MITxxx — Unofficial MITx offline course app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  connectivity_plus: ^6.1.3
  cookie_jar: ^4.0.8
  dio: ^5.8.0
  dio_cookie_manager: ^3.1.1
  drift: ^2.23.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^3.1.0
  go_router: ^14.6.1
  html_unescape: ^2.0.0
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.0
  sqlite3_flutter_libs: ^0.5.25
  video_player: ^2.9.2
  webview_flutter: ^4.10.0

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.23.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.0
  rps: ^0.7.0
  very_good_analysis: ^8.0.0

scripts:
  codegen: dart run build_runner build --delete-conflicting-outputs
  codegen:watch: dart run build_runner watch --delete-conflicting-outputs
  icons: dart run flutter_launcher_icons
  splash: dart run flutter_native_splash:create

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a2e"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
