name: emajtee
description: "MITxxx — Unofficial MITx offline course app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.1

  # Local storage
  drift: ^2.23.1
  sqlite3_flutter_libs: ^0.5.25

  # Network
  dio: ^5.8.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8

  # Secure storage for auth tokens/cookies
  flutter_secure_storage: ^9.2.2

  # Models / serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Connectivity
  connectivity_plus: ^6.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  drift_dev: ^2.23.1

  # Assets
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

  # Linting
  very_good_analysis: ^8.0.0

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#1a1a2e"
  android: true
  ios: true
  web: true

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
